name: Deploy to Development

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Initialize Terraform
        run: terraform init
        working-directory: infrastructure/terraform

      - name: Validate Terraform
        run: terraform validate
        working-directory: infrastructure/terraform

      - name: Format check
        run: terraform fmt -check
        working-directory: infrastructure/terraform

      - name: Plan infrastructure changes
        id: plan
        run: |
          terraform plan \
            -var-file="environments/dev.tfvars" \
            -var="aws_region=eu-west-1" \
            -out=tfplan
        working-directory: infrastructure/terraform

      - name: Apply infrastructure changes
        run: terraform apply tfplan
        working-directory: infrastructure/terraform

      - name: Get deployment outputs
        id: outputs
        run: echo "::set-output name=alb_dns::$(terraform output -raw alb_dns_name)"
        working-directory: infrastructure/terraform

      - name: Deploy services
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="$ACCOUNT_ID.dkr.ecr.eu-west-1.amazonaws.com"
          
          # Update ECS services with new images
          aws ecs update-service \
            --cluster ecommerce-cluster-dev \
            --service ecommerce-api-service-dev \
            --force-new-deployment \
            --region eu-west-1

      - name: Wait for service deployment
        run: |
          aws ecs wait services-stable \
            --cluster ecommerce-cluster-dev \
            --services ecommerce-api-service-dev \
            --region eu-west-1 || true

      - name: Run database migrations
        run: |
          aws ecs run-task \
            --cluster ecommerce-cluster-dev \
            --task-definition ecommerce-api-dev \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[''] ,securityGroups=['']}" \
            --overrides '{
              "containerOverrides": [{
                "name": "api",
                "command": ["npm", "run", "migrate:up"]
              }]
            }' \
            --region eu-west-1 || true

      - name: Verify deployment
        run: |
          echo "Deployment completed successfully!"
          echo "ALB URL: ${{ steps.outputs.outputs.alb_dns }}"
