name: Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Initialize Terraform
        run: terraform init
        working-directory: infrastructure/terraform

      - name: Plan infrastructure changes
        run: |
          terraform plan \
            -var-file="environments/staging.tfvars" \
            -var="aws_region=us-east-1" \
            -out=tfplan
        working-directory: infrastructure/terraform

      - name: Approve and apply changes
        run: terraform apply tfplan
        working-directory: infrastructure/terraform

      - name: Deploy services
        run: |
          aws ecs update-service \
            --cluster ecommerce-cluster-staging \
            --service ecommerce-api-service-staging \
            --force-new-deployment \
            --region us-east-1

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster ecommerce-cluster-staging \
            --services ecommerce-api-service-staging \
            --region us-east-1 || true

      - name: Run tests in staging
        run: ./scripts/health-check.sh staging us-east-1
