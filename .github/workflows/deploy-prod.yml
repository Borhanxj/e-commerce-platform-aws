name: Deploy to Production

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type DEPLOY_PRODUCTION to confirm'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Require confirmation
        run: |
          if [[ "${{ github.event.inputs.confirmation }}" != "DEPLOY_PRODUCTION" && "${{ github.event_name }}" != "push" ]]; then
            echo "Deployment cancelled - confirmation required"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Initialize Terraform
        run: terraform init
        working-directory: infrastructure/terraform

      - name: Plan infrastructure changes
        run: |
          terraform plan \
            -var-file="environments/prod.tfvars" \
            -var="aws_region=us-east-1" \
            -out=tfplan
        working-directory: infrastructure/terraform

      - name: Require approval for production changes
        run: |
          terraform show tfplan
          echo "Production infrastructure changes require manual approval"

      - name: Apply infrastructure changes
        run: terraform apply tfplan
        working-directory: infrastructure/terraform

      - name: Create database backup
        run: |
          aws rds create-db-snapshot \
            --db-instance-identifier ecommerce-db-prod \
            --db-snapshot-identifier ecommerce-db-prod-$(date +%Y%m%d-%H%M%S) \
            --region us-east-1

      - name: Deploy services with canary
        run: |
          aws ecs update-service \
            --cluster ecommerce-cluster-prod \
            --service ecommerce-api-service-prod \
            --force-new-deployment \
            --region us-east-1

      - name: Monitor deployment
        run: |
          for i in {1..30}; do
            STATUS=$(aws ecs describe-services \
              --cluster ecommerce-cluster-prod \
              --services ecommerce-api-service-prod \
              --region us-east-1 \
              --query 'services[0].deployments[0].status' \
              --output text)
            
            if [[ "$STATUS" == "PRIMARY" ]]; then
              echo "Deployment successful"
              exit 0
            fi
            echo "Deployment in progress... (attempt $i/30)"
            sleep 10
          done
          
          echo "Deployment timeout"
          exit 1

      - name: Run smoke tests
        run: ./scripts/health-check.sh prod us-east-1

      - name: Notify deployment success
        if: success()
        run: |
          echo "Production deployment successful!"
          echo "Time: $(date)"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "Production deployment failed!"
          exit 1
